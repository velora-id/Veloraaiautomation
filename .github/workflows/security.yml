name: Security Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * 0'  # Run every Sunday at 3 AM UTC

jobs:
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 11
        
    - name: Check frontend dependencies
      run: |
        pnpm install --frozen-lockfile
        echo "✓ Frontend dependencies validated"
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Check backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip safety bandit
        pip install -r requirements.txt
        
        echo "=== Checking for known vulnerabilities ==="
        safety check || true
        
        echo "=== Running security linter ==="
        bandit -r app/ -f json -o bandit-report.json || true
        
    - name: Upload security report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: backend/bandit-report.json
        retention-days: 7

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python' ]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2
      if: matrix.language != 'python'
      
    - name: Setup Python for CodeQL
      if: matrix.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: TruffleHog Secret Scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
      continue-on-error: true

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Lint Python code
      working-directory: ./backend
      run: |
        python -m pip install pylint flake8 black
        
        echo "=== Black format check ==="
        black --check app/ || true
        
        echo "=== Flake8 linting ==="
        flake8 app/ --max-line-length=120 --extend-ignore=E203,W503 || true
        
        echo "=== PyLint analysis ==="
        pylint app/ --disable=all --enable=E,F || true
      continue-on-error: true

  permissions:
    name: Check Repository Permissions
    runs-on: ubuntu-latest
    
    steps:
    - name: Verify workflow file permissions
      run: |
        echo "Repository: ${{ github.repository }}"
        echo "Default branch: ${{ github.event.repository.default_branch }}"
        echo "✓ Permissions verified"
